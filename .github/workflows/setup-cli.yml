# Example: Install only the BoringCache CLI
# Use boringcache/one as a CLI bootstrap step with setup: none

name: Setup CLI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Basic CLI setup
  basic:
    runs-on: ubuntu-latest
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Install the CLI without enabling any cache mode.
      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos

      # CLI is now available
      - run: boringcache --version
      - run: boringcache workspaces

  # Pin specific CLI version
  pinned-version:
    runs-on: ubuntu-latest
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos
          cli-version: v1.1.0  # Pin to specific version

      - run: boringcache --version

  # Custom workflow with CLI
  custom-workflow:
    runs-on: ubuntu-latest
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos

      # Use CLI directly for custom caching logic
      - name: Restore dependencies
        run: |
          boringcache restore \
            ${{ github.repository }} \
            deps:node_modules \
            --verbose \
            || echo "Cache miss, will install"

      - run: npm ci

      - name: Save dependencies
        run: |
          boringcache save \
            ${{ github.repository }} \
            deps:node_modules \
            --verbose \
            --exclude "*.log"

  # Matrix build with CLI
  matrix:
    runs-on: ${{ matrix.os }}
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos

      - run: boringcache --version
      - run: boringcache workspaces
