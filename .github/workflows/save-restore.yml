# Example: Job lifecycle control with boringcache/one
# boringcache/one restores at step start and saves in the post step

name: Lifecycle Pattern

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Pattern 1: Restore before install, save automatically after the job step
  restore-and-save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Restore now, save automatically in the post step.
      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos
          entries: deps:node_modules
          verbose: true  # Show detailed cache operations
          exclude: "*.log"  # Exclude log files from cache
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: npm ci
      - run: npm test

  # Pattern 2: Build artifacts shared across jobs
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      # Save build output in the post step after npm run build.
      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos
          entries: build-${{ github.sha }}:dist
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Restore the build output and skip save by omitting a save-capable token.
      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos
          entries: build-${{ github.sha }}:dist
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}

      - run: ls -la dist/
      # - run: deploy dist/

  # Pattern 3: actions/cache compatible syntax
  actions-cache-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Keep actions/cache-compatible inputs and let one handle restore + post-save.
      - uses: boringcache/one@v1
        with:
          setup: none
          path: |
            node_modules
            ~/.npm
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            deps-${{ runner.os }}-
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: npm ci
      - run: npm test
