# Example: Drop-in replacement for actions/cache
# This is the simplest migration path to boringcache/one

name: CI with boringcache/one

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Drop-in replacement for actions/cache
      # Keep path/key/restore-keys and swap the action name.
      - uses: boringcache/one@v1
        with:
          setup: none
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            deps-${{ runner.os }}-
          verbose: true  # Show detailed cache operations
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: npm ci
      - run: npm test
      - run: npm run build

  # Example with workspace format (recommended for new projects)
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Workspace format: cleaner syntax for multiple cache entries
      - uses: boringcache/one@v1
        with:
          setup: none
          workspace: boringcache/actions-demos
          entries: |
            deps:node_modules
            build:.next
          exclude: "*.log"  # Exclude log files from cache
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: npm ci
      - run: npm test
      - run: npm run build
