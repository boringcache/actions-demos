# Example: Rust with rust-sccache mode
# Install Rust, cache cargo/target state, and wire sccache through boringcache/one

name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Automatic Rust setup + caching
  zero-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          toolchain: stable
          workspace: boringcache/actions-demos
          sccache: true
          sccache-mode: proxy
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: cargo build
      - run: cargo test

  # With specific toolchain and verbose output
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          toolchain: nightly
          components: clippy, rustfmt
          workspace: boringcache/actions-demos
          sccache: true
          sccache-mode: proxy
          verbose: true  # Show detailed cache operations
          exclude: "*.fingerprint"  # Exclude fingerprint files from cache
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # Release build
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          toolchain: stable
          workspace: boringcache/actions-demos
          sccache: true
          sccache-mode: proxy
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: cargo build --release
      - run: cargo test --release

  # Matrix: multiple platforms
  matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          toolchain: ${{ matrix.toolchain }}
          workspace: boringcache/actions-demos
          sccache: true
          sccache-mode: proxy
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: rustc --version
      - run: cargo build
      - run: cargo test

  # Workspace with multiple crates
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          toolchain: stable
          workspace: boringcache/actions-demos
          sccache: true
          sccache-mode: proxy
          # Cache is automatically scoped to Cargo.lock hash
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: cargo build --workspace
      - run: cargo test --workspace

  # Cross-compilation
  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          toolchain: stable
          targets: x86_64-unknown-linux-musl
          workspace: boringcache/actions-demos
          sccache: true
          sccache-mode: proxy
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: cargo build --target x86_64-unknown-linux-musl
