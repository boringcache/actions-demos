# Example: Node.js with the node preset
# Install Node via mise and cache package-manager state with boringcache/one

name: Node.js

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Automatic Node.js setup + caching
  zero-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          preset: node
          tools: "node@20"
          workspace: boringcache/actions-demos
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: npm ci
      - run: npm test

  # With yarn
  yarn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          preset: node
          tools: "node@20"
          workspace: boringcache/actions-demos
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: yarn install
      - run: yarn test

  # With pnpm
  pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          preset: node
          tools: "node@20"
          workspace: boringcache/actions-demos
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm test

  # Matrix: multiple Node.js versions with verbose output
  matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          preset: node
          tools: node@${{ matrix.node }}
          workspace: boringcache/actions-demos
          verbose: true  # Show detailed cache operations
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: node --version
      - run: npm ci
      - run: npm test

  # Custom workspace
  custom-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          preset: node
          tools: "node@20"
          workspace: my-org/my-project  # Custom workspace
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: npm ci
      - run: npm test
