# Example: Ruby with the ruby preset
# Install Ruby via mise and cache Bundler state with boringcache/one

name: Ruby

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Automatic Ruby setup + caching
  zero-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: boringcache/one@v1
        with:
          preset: ruby
          tools: "ruby@3.3"
          workspace: boringcache/actions-demos
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_SAVE_TOKEN }}

      - run: bundle install
      - run: bundle exec rake test

  # Rails application (example - requires Rails app in repo)
  # Uncomment when you have a Rails app
  # rails:
  #   runs-on: ubuntu-latest
  #   services:
  #     postgres:
  #       image: postgres:16
